# Render Blueprint — https://render.com/docs/blueprint-spec
# Kullanım: Render Dashboard → New → Blueprint → bu repo'yu seç.
# sync: false olan değişkenlerin DEĞERLERİ dashboard'dan elle girilir
# (yereldeki .env dosyasındaki değerlerin aynısı) — repo'da sır tutulmaz.
services:
  - type: web
    name: sosyal
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python serve.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: FLASK_SECRET_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_CLAIM_EMAIL
        sync: false
      - key: KLIPY_API_KEY
        sync: false
