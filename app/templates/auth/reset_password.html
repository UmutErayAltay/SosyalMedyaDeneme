{% extends "base.html" %}
{% block title %}Şifre Sıfırla{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Yeni Şifre Belirle</h1>

    <div id="reset-error" class="flash flash-error" role="alert" hidden></div>

    <form method="post" id="reset-form" hidden>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="access_token" id="access_token">
        <input type="hidden" name="refresh_token" id="refresh_token">
        <label>Yeni şifre (en az 6 karakter)
            <input type="password" name="password" required minlength="6">
        </label>
        <button type="submit" class="btn btn-primary">Şifreyi güncelle</button>
    </form>
</div>

<script>
(function () {
    // Supabase recovery linki token'ları URL fragment'ında (#access_token=...)
    // gönderir — sunucuya hiç ulaşmaz, bu yüzden burada JS ile okunur.
    var hash = window.location.hash.replace(/^#/, '');
    var params = new URLSearchParams(hash);
    var accessToken = params.get('access_token');
    var refreshToken = params.get('refresh_token');
    var type = params.get('type');

    var errorBox = document.getElementById('reset-error');
    var form = document.getElementById('reset-form');

    if (accessToken && type === 'recovery') {
        document.getElementById('access_token').value = accessToken;
        document.getElementById('refresh_token').value = refreshToken || '';
        form.hidden = false;
    } else {
        errorBox.textContent = 'Bu link geçersiz veya süresi dolmuş. Lütfen yeniden şifre sıfırlama isteği gönder.';
        errorBox.hidden = false;
    }
})();
</script>
{% endblock %}
