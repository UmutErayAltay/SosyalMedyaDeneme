{% extends "base.html" %}
{% block title %}Giriş{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Giriş Yap</h1>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>E-posta
            <input type="email" name="email" required>
        </label>
        <label>Şifre
            <input type="password" name="password" required>
        </label>
        <button type="submit" class="btn btn-primary">Giriş</button>
    </form>
    <p class="muted"><a href="{{ url_for('auth.forgot_password') }}">Şifreni mi unuttun?</a></p>
    <p class="muted">Hesabın yok mu? <a href="{{ url_for('auth.register') }}">Kayıt ol</a></p>
</div>
{% endblock %}
