{% extends "base.html" %}
{% block title %}Şifremi Unuttum{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Şifremi Unuttum</h1>
    <p class="muted">E-posta adresini gir, sıfırlama linki gönderelim.</p>
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <label>E-posta
            <input type="email" name="email" required>
        </label>
        <button type="submit" class="btn btn-primary">Sıfırlama linki gönder</button>
    </form>
    <p class="muted"><a href="{{ url_for('auth.login') }}">Girişe dön</a></p>
</div>
{% endblock %}
