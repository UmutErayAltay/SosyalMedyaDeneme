{% extends "base.html" %}
{% block title %}Profili Düzenle{% endblock %}
{% block content %}
<div class="auth-card">
    <h1>Profili Düzenle</h1>
    <form method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="avatar-preview-row">
            <img id="avatar-preview"
                 src="{{ profile.avatar_url if profile.avatar_url else '' }}"
                 class="avatar large"
                 {% if not profile.avatar_url %}style="display:none"{% endif %}>
            <div id="avatar-placeholder" class="avatar large avatar-placeholder"
                 {% if profile.avatar_url %}style="display:none"{% endif %}></div>
            <label class="avatar-upload-label">
                <input type="file" name="avatar" accept="image/png,image/jpeg,image/gif,image/webp"
                       id="avatar-input" style="display:none">
                <span class="btn btn-ghost">Avatar Seç</span>
            </label>
        </div>

        <label>Kullanıcı adı
            <input type="text" name="username" value="{{ profile.username }}" required minlength="3">
        </label>
        <label>Ad Soyad
            <input type="text" name="full_name" value="{{ profile.full_name or '' }}">
        </label>
        <label>Biyografi
            <textarea name="bio" rows="3" placeholder="Kendinden bahset...">{{ profile.bio or '' }}</textarea>
        </label>
        <button type="submit" class="btn btn-primary">Kaydet</button>
        <a href="{{ url_for('routes.profile', username=profile.username) }}" class="btn btn-ghost">İptal</a>
    </form>
</div>
<script>
    // Avatar önizleme
    document.getElementById('avatar-input').addEventListener('change', function(e) {
        var file = e.target.files[0];
        if (file) {
            var reader = new FileReader();
            reader.onload = function(ev) {
                var img = document.getElementById('avatar-preview');
                img.src = ev.target.result;
                img.style.display = 'block';
                document.getElementById('avatar-placeholder').style.display = 'none';
            };
            reader.readAsDataURL(file);
        }
    });
</script>
{% endblock %}
