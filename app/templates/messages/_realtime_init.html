{# Supabase Realtime kurulumu — inbox.html ve conversation.html'de ortak;
   aktif konuşma olmasa bile yüklenir, çünkü kullanıcı listeden bir konuşmaya
   AJAX ile geçtiğinde chat.js'in window.supabaseClient'ı hazır bulması gerekir. #}
<script>
    window.SUPABASE_URL = "{{ config.SUPABASE_URL }}";
    window.SUPABASE_KEY = "{{ config.SUPABASE_PUBLISHABLE_KEY }}";
    window.SB_ACCESS_TOKEN = "{{ session.access_token }}";
    window.SB_REFRESH_TOKEN = "{{ session.refresh_token }}";
    window.ME_ID = "{{ me.id }}";
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// auth kalıcılığı TAMAMEN kapalı: varsayılan persistSession, localStorage'da
// haftalar önce kalmış bayat bir oturumu otomatik yükleyip bizim verdiğimiz
// taze token'ı İÇERİDEN eziyordu — normal profilde CHANNEL_ERROR/401, gizli
// sekmede (boş localStorage) sorunsuz (canlı test bulgusu, Brave). Oturumun
// tek sahibi Flask; tarayıcı sadece setAuth ile verilen token'ı kullanır.
window.supabaseClient = window.supabase.createClient(
    window.SUPABASE_URL,
    window.SUPABASE_KEY,
    { auth: { persistSession: false, autoRefreshToken: false, detectSessionInUrl: false } }
);
// Token yenileme SADECE sunucuda yapılır (auth.refresh_session_tokens) —
// tarayıcıda setSession/auto-refresh KULLANILMAZ: tek kullanımlık refresh
// token iki taraf (tarayıcı + Flask) arasında tüketilip 400 üretiyor,
// Realtime kimliksiz kalıp mesaj olayları sessizce kesiliyordu (kullanıcı
// konsol raporu: "POST /auth/v1/token?grant_type=refresh_token 400").
// Realtime'ın ihtiyacı olan tek şey geçerli bir access token: setAuth yeter.
window.supabaseClient.realtime.setAuth(window.SB_ACCESS_TOKEN);
// Uzun süre açık kalan sekmede token bayatlar — 30 dakikada bir sunucudan
// taze token alıp Realtime'a uygula
setInterval(function () {
    fetch('/auth/realtime-token')
        .then(function (r) { return r.json(); })
        .then(function (d) {
            if (d.access_token) window.supabaseClient.realtime.setAuth(d.access_token);
        })
        .catch(function () { /* bir sonraki turda tekrar denenir */ });
}, 30 * 60 * 1000);
</script>
<script src="{{ url_for('static', filename='js/stickers.js') }}"></script>
<script src="{{ url_for('static', filename='js/chat.js') }}"></script>
<script src="{{ url_for('static', filename='js/call.js') }}"></script>
<script src="{{ url_for('static', filename='js/messagesPanel.js') }}"></script>
